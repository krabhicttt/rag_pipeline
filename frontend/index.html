<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RAG Chat</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#4fc3f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>RAG Chat</span>
        </div>
        <button class="btn-new-chat" id="newChatBtn" title="New Chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <nav class="sidebar-nav">
        <span class="nav-label">Conversations</span>
        <ul class="conversation-list" id="conversationList">
          <!-- Populated by JS -->
        </ul>
      </nav>

      <div class="sidebar-footer">
        <div class="model-selector">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="3" stroke="#888" stroke-width="2"/>
            <path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83" stroke="#888" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <select id="modelSelect" class="model-select">
            <option value="llama3.2">llama3.2</option>
            <option value="mistral">mistral</option>
            <option value="llama3.1">llama3.1</option>
            <option value="gemma2">gemma2</option>
            <option value="phi3">phi3</option>
          </select>
        </div>
        <div class="status-indicator" id="statusIndicator">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">Checking...</span>
        </div>
      </div>
    </aside>

    <!-- Main Chat -->
    <main class="main">
      <header class="topbar">
        <button class="btn-icon sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <span class="topbar-title" id="topbarTitle">New Chat</span>
        <button class="btn-icon" id="clearChatBtn" title="Clear chat">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </header>

      <!-- Messages Area -->
      <div class="messages-wrapper">
        <div class="messages" id="messages">
          <!-- Welcome screen -->
          <div class="welcome" id="welcomeScreen">
            <div class="welcome-icon">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke="#4fc3f7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <h2>How can I help you today?</h2>
            <p>Ask anything about your documents. I'll search through the knowledge base and provide grounded answers.</p>
            <div class="suggestions">
              <button class="suggestion-chip" data-text="What documents are available in the knowledge base?">What documents are available?</button>
              <button class="suggestion-chip" data-text="Summarize the key topics covered in the documents.">Summarize key topics</button>
              <button class="suggestion-chip" data-text="What are the main concepts I should know?">Main concepts overview</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <div class="input-box">
            <textarea
              id="chatInput"
              placeholder="Ask anything about your documents..."
              rows="1"
              maxlength="4000"
            ></textarea>
            <div class="input-actions">
              <span class="char-count" id="charCount">0 / 4000</span>
              <button class="btn-send" id="sendBtn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                  <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </button>
            </div>
          </div>
          <p class="input-hint">Press <kbd>Enter</kbd> to send · <kbd>Shift+Enter</kbd> for new line</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Source Modal -->
  <div class="modal-overlay" id="modalOverlay" style="display:none">
    <div class="modal">
      <div class="modal-header">
        <h3>Sources</h3>
        <button class="btn-icon" id="modalClose">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
